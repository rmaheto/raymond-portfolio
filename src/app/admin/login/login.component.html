<div class="min-h-screen bg-slate-900 flex items-center justify-center p-4">
  <div class="w-full max-w-sm bg-slate-800 rounded-xl p-8 shadow-2xl">
    <h1 class="text-2xl font-bold text-white mb-2">Portfolio Admin</h1>
    <p class="text-slate-400 text-sm mb-6">Sign in to manage your portfolio content.</p>

    <form (ngSubmit)="submit()" #f="ngForm">
      <div class="mb-4">
        <label class="block text-sm text-slate-300 mb-1">Username</label>
        <input [(ngModel)]="username" name="username" required
          class="w-full px-3 py-2 bg-slate-700 text-white rounded-lg border border-slate-600
                 focus:outline-none focus:border-blue-500 text-sm" />
      </div>

      <div class="mb-6">
        <label class="block text-sm text-slate-300 mb-1">Password</label>
        <input [(ngModel)]="password" name="password" type="password" required
          class="w-full px-3 py-2 bg-slate-700 text-white rounded-lg border border-slate-600
                 focus:outline-none focus:border-blue-500 text-sm" />
      </div>

      <p *ngIf="error" class="text-red-400 text-sm mb-4">{{ error }}</p>

      <button type="submit" [disabled]="loading || !username || !password"
        class="w-full py-2 bg-blue-600 hover:bg-blue-700 disabled:opacity-50
               text-white font-medium rounded-lg transition text-sm">
        {{ loading ? 'Signing in…' : 'Sign In' }}
      </button>
    </form>
  </div>
</div>
